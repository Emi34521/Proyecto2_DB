<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Compras — Tienda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header"><h1>Compras</h1><p>Registro de compras a proveedores (incrementa stock)</p></div>
    <div class="card">
      <div class="card-header"><span></span><button class="btn btn-primary" onclick="openModal('modal-main')">+ Registrar compra</button></div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>Fecha</th><th>Producto</th><th>Proveedor</th><th>Cantidad</th><th>Precio mayor</th><th>Total</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="7" class="empty-state"><span class="spinner"></span></td></tr></tbody></table>
      </div>
    </div>
  </main>
</div>
<div class="modal-overlay" id="modal-main">
  <div class="modal">
    <div class="modal-header"><h3>Registrar compra</h3><button class="modal-close" onclick="closeModal('modal-main')">✕</button></div>
    <div class="form-row">
      <div class="form-group"><label>Proveedor *</label><select id="x-prov" class="form-control"><option value="">Seleccionar...</option></select></div>
      <div class="form-group"><label>Producto *</label><select id="x-prod" class="form-control"><option value="">Seleccionar...</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Cantidad *</label><input id="x-cant" type="number" min="1" class="form-control" placeholder="0"/></div>
      <div class="form-group"><label>Precio por unidad (Q) *</label><input id="x-precio" type="number" step="0.01" class="form-control" placeholder="0.00"/></div>
    </div>
    <div id="x-err" style="color:var(--danger);font-size:12px;display:none;"></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('modal-main')">Cancelar</button><button class="btn btn-primary" onclick="save()">Registrar</button></div>
  </div>
</div>
<script src="../js/api.js"></script><script src="../js/layout.js"></script>
<script>
buildLayout("compras");
async function load(){
  try{
    const [compras,provs,prods]=await Promise.all([api.get("/compras"),api.get("/proveedores"),api.get("/productos")]);
    const pSel=document.getElementById("x-prov");const prSel=document.getElementById("x-prod");
    provs.forEach(p=>pSel.innerHTML+=`<option value="${p.id_proveedor}">${p.nombre}</option>`);
    prods.forEach(p=>prSel.innerHTML+=`<option value="${p.id_producto}">${p.nombre}</option>`);
    const tbody=document.getElementById("tbody");
    if(!compras.length){tbody.innerHTML=`<tr><td colspan="7" class="empty-state">Sin compras</td></tr>`;return;}
    tbody.innerHTML=compras.map(c=>`<tr>
      <td><span class="badge badge-blue">#${c.id_compra}</span></td>
      <td>${fmtDate(c.fecha)}</td><td>${c.producto}</td><td>${c.proveedor}</td>
      <td>${c.cantidad_compra}</td>
      <td style="font-family:var(--font)">${fmtMoney(c.precio_mayor_unidad)}</td>
      <td style="font-family:var(--font)">${fmtMoney(c.precio_mayor_unidad*c.cantidad_compra)}</td></tr>`).join("");
  }catch(e){showToast(e.message,"error");}
}
async function save(){
  const errDiv=document.getElementById("x-err");
  const body={id_proveedor:parseInt(document.getElementById("x-prov").value),id_producto:parseInt(document.getElementById("x-prod").value),cantidad_compra:parseInt(document.getElementById("x-cant").value),precio_mayor_unidad:parseFloat(document.getElementById("x-precio").value)};
  if(!body.id_proveedor||!body.id_producto||isNaN(body.cantidad_compra)||isNaN(body.precio_mayor_unidad)){errDiv.textContent="Todos los campos son obligatorios.";errDiv.style.display="block";return;}
  try{await api.post("/compras",body);showToast("Compra registrada. Stock actualizado.","success");closeModal("modal-main");load();}
  catch(e){errDiv.textContent=e.message;errDiv.style.display="block";}
}
load();
</script>
</body>
</html>
