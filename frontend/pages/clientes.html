<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Clientes — Tienda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header"><h1>Clientes</h1><p>Registro y gestión de clientes</p></div>
    <div class="card">
      <div class="card-header">
        <div class="search-bar"><input id="search" type="text" class="form-control" placeholder="Buscar cliente..." style="width:240px" oninput="filterTable()"/></div>
        <button class="btn btn-primary" onclick="openCreate()">+ Nuevo cliente</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>Nombre</th><th>DPI</th><th>Email</th><th>Teléfono</th><th>Dirección</th><th>Acciones</th></tr></thead>
        <tbody id="tbody-clientes"><tr><td colspan="7" class="empty-state"><span class="spinner"></span></td></tr></tbody></table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-header"><h3 id="modal-title">Nuevo cliente</h3><button class="modal-close" onclick="closeModal('modal-cliente')">✕</button></div>
    <input type="hidden" id="c-id"/>
    <div class="form-row">
      <div class="form-group"><label>Nombre *</label><input id="c-nombre" class="form-control"/></div>
      <div class="form-group"><label>DPI *</label><input id="c-dpi" class="form-control" placeholder="13 dígitos"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input id="c-email" type="email" class="form-control"/></div>
      <div class="form-group"><label>Teléfono</label><input id="c-telefono" class="form-control"/></div>
    </div>
    <div class="form-group"><label>Dirección</label><input id="c-direccion" class="form-control"/></div>
    <div id="c-error" style="color:var(--danger);font-size:12px;margin-top:4px;display:none;"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-cliente')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCliente()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-del">
  <div class="modal" style="max-width:360px;">
    <div class="modal-header"><h3>Eliminar cliente</h3><button class="modal-close" onclick="closeModal('modal-del')">✕</button></div>
    <p style="color:var(--muted);font-size:13px;">¿Confirmas la eliminación de este cliente?</p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-del')">Cancelar</button>
      <button class="btn btn-danger" onclick="confirmDel()">Eliminar</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
buildLayout("clientes");
let all = [], delId = null;

async function load() {
  try { all = await api.get("/clientes"); render(all); }
  catch(e) { showToast("Error: "+e.message,"error"); }
}
function render(rows) {
  const tbody = document.getElementById("tbody-clientes");
  if (!rows.length) { tbody.innerHTML=`<tr><td colspan="7" class="empty-state">Sin clientes</td></tr>`; return; }
  tbody.innerHTML = rows.map(c=>`<tr>
    <td><span class="badge badge-blue">#${c.id_cliente}</span></td>
    <td><strong>${c.nombre}</strong></td>
    <td style="font-family:var(--font)">${c.DPI}</td>
    <td>${c.email||"—"}</td>
    <td>${c.telefono||"—"}</td>
    <td>${c.direccion||"—"}</td>
    <td>
      <button class="btn btn-ghost btn-sm" onclick="openEdit(${c.id_cliente})">Editar</button>
      <button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="openDel(${c.id_cliente})">Eliminar</button>
    </td></tr>`).join("");
}
function filterTable() {
  const q = document.getElementById("search").value.toLowerCase();
  render(all.filter(c=>c.nombre.toLowerCase().includes(q)||c.DPI.includes(q)||(c.email||"").toLowerCase().includes(q)));
}
function clearForm() {
  ["c-id","c-nombre","c-dpi","c-email","c-telefono","c-direccion"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("c-error").style.display="none";
}
function openCreate() { clearForm(); document.getElementById("modal-title").textContent="Nuevo cliente"; openModal("modal-cliente"); }
async function openEdit(id) {
  try {
    const c = await api.get(`/clientes/${id}`);
    document.getElementById("c-id").value       = c.id_cliente;
    document.getElementById("c-nombre").value   = c.nombre;
    document.getElementById("c-dpi").value      = c.DPI;
    document.getElementById("c-email").value    = c.email||"";
    document.getElementById("c-telefono").value = c.telefono||"";
    document.getElementById("c-direccion").value= c.direccion||"";
    document.getElementById("modal-title").textContent="Editar cliente";
    openModal("modal-cliente");
  } catch(e) { showToast(e.message,"error"); }
}
function openDel(id) { delId=id; openModal("modal-del"); }
async function confirmDel() {
  try { await api.delete(`/clientes/${delId}`); showToast("Cliente eliminado","success"); closeModal("modal-del"); load(); }
  catch(e) { showToast(e.message,"error"); }
}
async function saveCliente() {
  const errDiv = document.getElementById("c-error");
  const id = document.getElementById("c-id").value;
  const body = {
    DPI:      document.getElementById("c-dpi").value.trim(),
    nombre:   document.getElementById("c-nombre").value.trim(),
    email:    document.getElementById("c-email").value.trim(),
    telefono: document.getElementById("c-telefono").value.trim(),
    direccion:document.getElementById("c-direccion").value.trim(),
  };
  if (!body.nombre || !body.DPI) { errDiv.textContent="Nombre y DPI son obligatorios."; errDiv.style.display="block"; return; }
  try {
    if (id) await api.put(`/clientes/${id}`, body); else await api.post("/clientes", body);
    showToast(id?"Cliente actualizado":"Cliente creado","success");
    closeModal("modal-cliente"); load();
  } catch(e) { errDiv.textContent=e.message; errDiv.style.display="block"; }
}
load();
</script>
</body>
</html>
