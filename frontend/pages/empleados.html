<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Empleados — Tienda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header"><h1>Empleados</h1><p>Gestión del personal</p></div>
    <div class="card">
      <div class="card-header">
        <span></span>
        <button class="btn btn-primary" onclick="openCreate()">+ Nuevo empleado</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>Nombre</th><th>Cargo</th><th>Email</th><th>Teléfono</th><th>Acciones</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="6" class="empty-state"><span class="spinner"></span></td></tr></tbody></table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-main">
  <div class="modal">
    <div class="modal-header"><h3 id="modal-title">Nuevo empleado</h3><button class="modal-close" onclick="closeModal('modal-main')">✕</button></div>
    <input type="hidden" id="e-id"/>
    <div class="form-row">
      <div class="form-group"><label>Nombre *</label><input id="e-nombre" class="form-control"/></div>
      <div class="form-group"><label>Cargo</label><input id="e-cargo" class="form-control"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input id="e-email" type="email" class="form-control"/></div>
      <div class="form-group"><label>Teléfono</label><input id="e-tel" class="form-control"/></div>
    </div>
    <div id="e-error" style="color:var(--danger);font-size:12px;margin-top:4px;display:none;"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-main')">Cancelar</button>
      <button class="btn btn-primary" onclick="save()">Guardar</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-del">
  <div class="modal" style="max-width:360px;"><div class="modal-header"><h3>Eliminar empleado</h3><button class="modal-close" onclick="closeModal('modal-del')">✕</button></div>
  <p style="color:var(--muted);font-size:13px;">¿Confirmas la eliminación?</p>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('modal-del')">Cancelar</button><button class="btn btn-danger" onclick="confirmDel()">Eliminar</button></div></div>
</div>

<script src="../js/api.js"></script><script src="../js/layout.js"></script>
<script>
buildLayout("empleados");
let all=[], delId=null;
async function load() {
  try { all=await api.get("/empleados"); render(all); } catch(e){ showToast(e.message,"error"); }
}
function render(rows){
  const tbody=document.getElementById("tbody");
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="6" class="empty-state">Sin empleados</td></tr>`;return;}
  tbody.innerHTML=rows.map(e=>`<tr>
    <td><span class="badge badge-blue">#${e.id_empleado}</span></td>
    <td><strong>${e.nombre}</strong></td>
    <td><span class="badge badge-purple">${e.cargo||"—"}</span></td>
    <td>${e.email||"—"}</td><td>${e.telefono||"—"}</td>
    <td><button class="btn btn-ghost btn-sm" onclick="openEdit(${e.id_empleado})">Editar</button>
    <button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="openDel(${e.id_empleado})">Eliminar</button></td></tr>`).join("");
}
function clearForm(){["e-id","e-nombre","e-cargo","e-email","e-tel"].forEach(id=>document.getElementById(id).value="");document.getElementById("e-error").style.display="none";}
function openCreate(){clearForm();document.getElementById("modal-title").textContent="Nuevo empleado";openModal("modal-main");}
function openEdit(id){const e=all.find(x=>x.id_empleado===id);if(!e)return;document.getElementById("e-id").value=e.id_empleado;document.getElementById("e-nombre").value=e.nombre;document.getElementById("e-cargo").value=e.cargo||"";document.getElementById("e-email").value=e.email||"";document.getElementById("e-tel").value=e.telefono||"";document.getElementById("modal-title").textContent="Editar empleado";openModal("modal-main");}
function openDel(id){delId=id;openModal("modal-del");}
async function confirmDel(){try{await api.delete(`/empleados/${delId}`);showToast("Eliminado","success");closeModal("modal-del");load();}catch(e){showToast(e.message,"error");}}
async function save(){
  const errDiv=document.getElementById("e-error");const id=document.getElementById("e-id").value;
  const body={nombre:document.getElementById("e-nombre").value.trim(),cargo:document.getElementById("e-cargo").value.trim(),email:document.getElementById("e-email").value.trim(),telefono:document.getElementById("e-tel").value.trim()};
  if(!body.nombre){errDiv.textContent="Nombre obligatorio.";errDiv.style.display="block";return;}
  try{if(id)await api.put(`/empleados/${id}`,body);else await api.post("/empleados",body);showToast(id?"Actualizado":"Creado","success");closeModal("modal-main");load();}catch(e){errDiv.textContent=e.message;errDiv.style.display="block";}
}
load();
</script>
</body>
</html>
